<section id="work">
  <div class="work-wrapper">
    <h2 class="heading">Portfolio Work</h2>

    <div class="card-grid">
      @for (project of projects; track project) {
        <div class="card">
          <h3>{{ project.title }}</h3>
          <p class="subtitle">{{ project.subtitle }}</p>
          <p class="description">{{ project.description }}</p>
          <button class="secondary-button-no-left-padding-copy" (click)="goToProject(project.id)">
            {{ project.buttonText }}
          </button>
        </div>
      }
    </div>
  </div>
</section>
